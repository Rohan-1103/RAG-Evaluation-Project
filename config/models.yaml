  # ---------------------------------------------------------------------------

  - id: gemini-1.5-pro
    display_name: "Gemini 1.5 Pro"
    provider: google
    model_name: "gemini-1.5-pro"
    context_window: 2097152          # 2M token context — largest available
    max_output_tokens: 8192
    cost_input_per_1k: 0.00125       # USD — prompts up to 128k tokens
    cost_output_per_1k: 0.00500
    supports_system_prompt: true
    supports_json_mode: true
    recommended_for:
      - judge                        # PRIMARY judge model — strongest reasoning
      - rag_pipeline
      - dataset_generation
    rate_limit_rpm: 2                # Free tier is very restrictive
    rate_limit_tpm: 32000
    enabled: true
    tags:
      - gemini
      - google
      - pro
      - long-context
      - recommended-judge

  - id: gemini-1.5-flash
    display_name: "Gemini 1.5 Flash"
