# -----------------------------------------------------------------------------
# DEFAULT MODEL ASSIGNMENTS
# These keys are read by Settings to resolve role → model_id at startup.
# All values must match an `id` field above where `enabled: true`.
# -----------------------------------------------------------------------------
defaults:
  # The LLM that answers questions in the RAG pipeline during eval runs
  rag_model: gemini-1.5-flash

  # The LLM that judges/scores RAG outputs — use strongest available
  judge_model: gemini-1.5-pro

  # The LLM that generates synthetic Q&A pairs from document chunks
  dataset_gen_model: gemini-1.5-flash

  # Models included in the default comparison matrix when user clicks
  # "Run Comparison" without manually selecting models
  default_comparison_models:
    - gemini-1.5-flash
    - gemini-1.5-flash-8b
    - gemini-1.0-pro

# -----------------------------------------------------------------------------
# COMPARISON MATRIX PARAMETERS
# Default parameter grid used in multi-model comparison runs.
# Each combination of (model × temperature × top_k) is one run config.
# Total runs = len(models) × len(temperatures) × len(top_k_values)
# Keep this small on free tier to avoid rate limit exhaustion.
# -----------------------------------------------------------------------------
comparison_grid:
  temperatures:
    - 0.0     # Deterministic — establishes a reproducible baseline
    - 0.3     # Low creativity — good for factual RAG
    - 0.7     # Moderate creativity — tests response variance

  top_k_values:
    - 3       # Tight retrieval — forces precision
    - 5       # Standard retrieval — balanced
    - 8       # Broad retrieval — tests context precision metric

  # Run only the default comparison models unless overridden in UI
  restrict_grid_to_default_models: true

  # Maximum total runs in a single comparison job (safety cap)
  # Prevents accidentally queuing 50+ runs on free tier
  max_total_runs: 12

# -----------------------------------------------------------------------------
# COST ESTIMATION HELPERS
# Used by the dashboard cost table to estimate run cost before execution.
# Assumptions are conservative — real costs may be lower.
# -----------------------------------------------------------------------------
cost_estimation:
  # Assumed average tokens per RAG response (input + output combined)
  avg_tokens_per_rag_call: 1500

  # Assumed average tokens per judge evaluation call (all 4 metrics combined)
  avg_tokens_per_eval_call: 2000

  # Assumed average tokens per dataset generation call
  avg_tokens_per_gen_call: 800

  # Safety multiplier applied to all estimates (accounts for retries + overhead)
  safety_multiplier: 1.25

# -----------------------------------------------------------------------------
# UI DISPLAY CONFIGURATION
# Controls how models appear in the Streamlit dashboard.
# -----------------------------------------------------------------------------
ui:
  # Tag filter chips shown at top of model selector
  filter_tags:
    - gemini
    - openai
    - anthropic
    - groq
    - low-cost
    - fast
    - recommended-judge
    - recommended-rag

  # Radar chart axis order (must match MetricWeightsConfig field names)
  radar_axes:
    - faithfulness
    - answer_relevance
    - context_precision
    - correctness

  # Colour palette per provider — used in all Plotly charts
  provider_colors:
    google: "#4285F4"
    openai: "#10A37F"
    anthropic: "#D97706"
    groq: "#7C3AED"
    unknown: "#6B7280"

  # Score band thresholds — used for traffic-light colouring in tables
  score_bands:
    excellent:
      min: 4.5
      max: 5.0
      color: "#16A34A"   # green
    good:
      min: 3.5
      max: 4.5
      color: "#65A30D"   # lime
    acceptable:
      min: 2.5
      max: 3.5
      color: "#D97706"   # amber
    poor:
      min: 1.0
      max: 2.5
      color: "#DC2626"   # red