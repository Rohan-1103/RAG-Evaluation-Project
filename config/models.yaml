# =============================================================================
# MODEL REGISTRY — config/models.yaml
#
# Single source of truth for every LLM the system can use.
# Loaded once at startup by config/settings.py — never hardcoded in src/.
#
# Schema per model entry:
#   id:               Internal identifier used in code + database records
#   display_name:     Human-readable label shown in the Streamlit dashboard
#   provider:         API provider key (maps to an API client class in src/)
#   model_name:       Exact string passed to the provider SDK
#   context_window:   Max tokens the model can receive (input + output combined)
#   max_output_tokens: Hard cap on generated tokens per call
#   cost_input_per_1k:  USD per 1,000 INPUT tokens  (0.0 = free tier / unknown)
#   cost_output_per_1k: USD per 1,000 OUTPUT tokens (0.0 = free tier / unknown)
#   supports_system_prompt: Whether the model honours a system role message
#   supports_json_mode:     Whether the model can be forced to output valid JSON
#   recommended_for:  List of use cases this model is suited for
#   rate_limit_rpm:   Requests per minute on free tier (0 = unknown / unlimited)
#   rate_limit_tpm:   Tokens per minute on free tier  (0 = unknown / unlimited)
#   enabled:          Set false to hide from UI without deleting the entry
#   tags:             Arbitrary labels for UI filtering
#
# Cost data sourced from official provider pricing pages.
# Last updated: 2025-06. Verify before production billing estimation.
# Free-tier models show 0.0 — treat as "no known billed cost at current usage."
# =============================================================================

# -----------------------------------------------------------------------------
# GOOGLE GEMINI — Primary provider (free tier available)
# -----------------------------------------------------------------------------
providers:
  google:
    display_name: "Google Gemini"
    base_url: "https://generativelanguage.googleapis.com"
    env_key: "GEMINI_API_KEY"
    client_class: "src.rag.clients.GeminiClient"

  openai:
    display_name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    env_key: "OPENAI_API_KEY"
    client_class: "src.rag.clients.OpenAIClient"

  anthropic:
    display_name: "Anthropic"
    base_url: "https://api.anthropic.com"
    env_key: "ANTHROPIC_API_KEY"
    client_class: "src.rag.clients.AnthropicClient"

  groq:
    display_name: "Groq"
    base_url: "https://api.groq.com/openai/v1"
    env_key: "GROQ_API_KEY"
    client_class: "src.rag.clients.GroqClient"

# -----------------------------------------------------------------------------
